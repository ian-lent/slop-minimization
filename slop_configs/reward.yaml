# Reward model config (optional: use with --config for score_reward.py / eval_reward_model.py)
# Model config is loaded from classifier_encoder.yaml or checkpoint_dir/config.yaml when not set.

reward:
  checkpoint_path: outputs/classifier
  config_path: slop_configs/classifier_encoder.yaml
  aggregation_mode: mean   # mean | max | topk
  topk_fraction: 0.1
  chunk_size: 256
  stride: null            # default chunk_size // 2
  lambda_rep: 0.0
  lambda_generic: 0.0
  lambda_len: 0.0
  min_target_length: 5
  max_target_length: 512
  device: null
  batch_size: 16
